name: Publish to PyPI

# Builds the package and publishes it to PyPI whenever you create a GitHub Release.
# Uses PyPI Trusted Publishing (OpenID Connect) — no API token or stored secret required.

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/xfa-extract
    permissions:
      id-token: write   # REQUIRED: lets GitHub mint the OIDC token PyPI trusts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
